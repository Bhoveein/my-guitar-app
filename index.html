<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Guitar Chords App</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --accent: #ffc107;
            --chord: #4dabf7;
            --danger: #ff6b6b;
            --success: #51cf66;
            --shadow: rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Navigation */
        .nav {
            background: var(--card);
            padding: 15px;
            position: sticky;
            top: 0;
            display: flex;
            gap: 10px;
            z-index: 10;
            border-bottom: 1px solid #333;
            overflow-x: auto;
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* Buttons */
        .btn {
            background: var(--accent);
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            color: #000;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,193,7,0.3); }
        .btn:active { transform: translateY(0); }

        .btn-alt {
            background: #444;
            color: white;
        }

        .btn-alt:hover { background: #555; }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover { background: #fa5252; }

        .btn-success {
            background: var(--success);
            color: #000;
        }

        .btn-success:hover { background: #69db7c; }

        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Home/List Screen */
        #home { padding: 0; }

        .song-list {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .song-item {
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .song-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .song-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .song-item-title {
            font-weight: 600;
            font-size: 16px;
            flex: 1;
        }

        .song-item-badge {
            background: var(--chord);
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .song-item-meta {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .song-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .song-item-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Editor Screen */
        #editor {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        #editor h3 {
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="search"],
        textarea {
            width: 100%;
            padding: 10px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="search"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(255,193,7,0.2);
        }

        textarea {
            height: 400px;
            resize: vertical;
            line-height: 1.5;
        }

        .editor-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .editor-buttons .btn {
            flex: 1;
        }

        /* Search Results */
        .search-results {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
        }

        .search-result-item {
            background: #222;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #333;
            transition: all 0.2s;
        }

        .search-result-item:hover {
            border-color: var(--accent);
            background: #2a2a2a;
        }

        .search-result-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .search-result-artist {
            font-size: 12px;
            color: #999;
        }

        .search-loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .search-loading::after {
            content: '';
            display: inline-block;
            animation: spin 1s linear infinite;
            border: 2px solid #444;
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Viewer Screen */
        #viewer {
            padding: 0;
        }

        #viewTitle {
            padding: 20px 20px 10px;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .viewer-info {
            padding: 0 20px;
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

        #viewContent {
            padding: 20px;
        }

        pre {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            line-height: 2.2;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .c {
            color: var(--chord);
            font-weight: bold;
            background: rgba(77,171,247,0.2);
            padding: 2px 4px;
            border-radius: 3px;
            position: relative;
            transform: translateY(-1.2em);
        }

        .line {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 1.2em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            padding: 25px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 24px var(--shadow);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-text {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: #000;
            padding: 12px 16px;
            border-radius: 5px;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
            z-index: 50;
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .song-list { grid-template-columns: 1fr; }
            .nav { flex-wrap: wrap; }
            .modal-content { width: 95%; }
        }
    </style>
</head>
<body>

<!-- Home Screen -->
<div id="home" class="screen active">
    <div class="nav">
        <button class="btn" onclick="app.showEditor()">+ Add Song</button>
        <button class="btn btn-alt" onclick="app.showImport()">🔍 Search Online</button>
    </div>
    <div class="song-list" id="songList"></div>
</div>

<!-- Editor Screen -->
<div id="editor" class="screen">
    <div class="nav">
        <button class="btn btn-alt" onclick="app.showHome()">← Back</button>
    </div>
    <div style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <h2>Add/Edit Song</h2>
        <p style="color: #999; margin-bottom: 20px;">Use [Chord] format for chords (e.g., [G], [Am7], [Dmaj])</p>

        <div class="form-group">
            <label for="songTitle">Song Title</label>
            <input type="text" id="songTitle" placeholder="e.g., Amazing Grace">
        </div>

        <div class="form-group">
            <label for="songContent">Song Content with Chords</label>
            <textarea id="songContent" placeholder="[G] Amazing grace\n[C] How sweet the [G] sound"></textarea>
        </div>

        <div class="editor-buttons">
            <button class="btn btn-alt" onclick="app.showHome()">Cancel</button>
            <button class="btn btn-success" onclick="app.saveSong()">Save Song</button>
        </div>
    </div>
</div>

<!-- Import Screen -->
<div id="import" class="screen">
    <div class="nav">
        <button class="btn btn-alt" onclick="app.showHome()">← Back</button>
    </div>
    <div style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <h2>Search Ultimate Guitar</h2>
        <p style="color: #999; margin-bottom: 20px;">Search for songs by title or artist</p>

        <div class="form-group">
            <label for="searchQuery">Song or Artist</label>
            <input type="search" id="searchQuery" placeholder="e.g., Stairway to Heaven, Wonderwall" onkeypress="if(event.key==='Enter') app.searchSongs()">
        </div>

        <button class="btn" onclick="app.searchSongs()" style="width: 100%; margin-bottom: 20px;">Search</button>

        <div id="searchContainer"></div>
    </div>
</div>

<!-- Viewer Screen -->
<div id="viewer" class="screen">
    <div class="nav">
        <button class="btn btn-alt" onclick="app.showHome()">← Back</button>
        <button class="btn" onclick="app.transpose(-1)">Key −</button>
        <button class="btn" onclick="app.transpose(1)">Key +</button>
        <button class="btn" id="transposeValue">+0</button>
        <button class="btn" id="scrollBtn" onclick="app.toggleScroll()">Scroll</button>
        <button class="btn btn-alt" onclick="app.editSong()">Edit</button>
        <button class="btn btn-danger" onclick="app.confirmDelete()">Delete</button>
    </div>
    <h2 id="viewTitle"></h2>
    <div class="viewer-info" id="viewerInfo"></div>
    <div id="viewContent"></div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">Delete Song?</div>
        <div class="modal-text">Are you sure you want to delete this song? This action cannot be undone.</div>
        <div class="modal-buttons">
            <button class="btn btn-alt" onclick="app.cancelDelete()">Cancel</button>
            <button class="btn btn-danger" onclick="app.deleteSong()">Delete</button>
        </div>
    </div>
</div>

<!-- Import Preview Modal -->
<div id="importModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">Import Song</div>
        <div class="modal-text">Preview and confirm before importing</div>
        
        <div class="form-group">
            <label for="importTitle">Title</label>
            <input type="text" id="importTitle" placeholder="Song Title">
        </div>

        <div class="form-group">
            <label for="importContent">Content</label>
            <textarea id="importContent" style="height: 200px;" placeholder="Song content"></textarea>
        </div>

        <div class="modal-buttons">
            <button class="btn btn-alt" onclick="app.cancelImport()">Cancel</button>
            <button class="btn btn-success" onclick="app.confirmImport()">Import</button>
        </div>
    </div>
</div>

<script>
    const app = {
        songs: [],
        currentSongIndex: null,
        transposeVal: 0,
        scrollInterval: null,
        notes: ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'],
        importBuffer: null,

        // Initialization
        init() {
            this.loadSongs();
            this.renderHome();
        },

        // Storage Management
        loadSongs() {
            try {
                const stored = localStorage.getItem('mySongs');
                this.songs = stored ? JSON.parse(stored) : [];
                this.songs = this.songs.map((s, i) => ({
                    ...s,
                    createdAt: s.createdAt || new Date().toISOString(),
                    id: s.id || i,
                    source: s.source || 'local'
                }));
            } catch (e) {
                console.error('Load error:', e);
                this.showToast('Error loading songs', 'error');
                this.songs = [];
            }
        },

        saveSongs() {
            try {
                localStorage.setItem('mySongs', JSON.stringify(this.songs));
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    this.showToast('Storage limit exceeded!', 'error');
                } else {
                    console.error('Save error:', e);
                    this.showToast('Error saving songs', 'error');
                }
            }
        },

        // Screen Navigation
        showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            clearInterval(this.scrollInterval);
        },

        showHome() {
            this.showScreen('home');
            this.renderHome();
        },

        showEditor(index = null) {
            this.showScreen('editor');
            if (index !== null) {
                const song = this.songs[index];
                document.getElementById('songTitle').value = song.title;
                document.getElementById('songContent').value = song.body;
                this.currentSongIndex = index;
            } else {
                document.getElementById('songTitle').value = '';
                document.getElementById('songContent').value = '';
                this.currentSongIndex = null;
            }
        },

        showImport() {
            this.showScreen('import');
            document.getElementById('searchQuery').value = '';
            document.getElementById('searchContainer').innerHTML = '';
        },

        // Home Screen Rendering
        renderHome() {
            const list = document.getElementById('songList');
            if (this.songs.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎸</div>
                        <h3>No songs yet</h3>
                        <p>Click "+ Add Song" or "🔍 Search Online" to get started!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = this.songs.map((s, i) => `
                <div class="song-item">
                    <div class="song-item-header">
                        <div class="song-item-title">${this.escapeHtml(s.title)}</div>
                        ${s.source && s.source !== 'local' ? `<div class="song-item-badge">${s.source}</div>` : ''}
                    </div>
                    <div class="song-item-meta">
                        ${s.body.split('\n').length} lines
                    </div>
                    <div class="song-item-actions">
                        <button class="btn" onclick="app.viewSong(${i})">View</button>
                        <button class="btn btn-alt" onclick="app.editSong(${i})">Edit</button>
                    </div>
                </div>
            `).join('');
        },

        // Ultimate Guitar Search
        async searchSongs() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) {
                this.showToast('Enter a song or artist name', 'error');
                return;
            }

            const container = document.getElementById('searchContainer');
            container.innerHTML = '<div class="search-loading">Searching...</div>';

            try {
                // Using Ultimate Guitar API via CORS proxy
                const response = await fetch(`https://api.ultimate-guitar.com/v3/search?query=${encodeURIComponent(query)}&type=Chords`);
                const data = await response.json();

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No results found. Try another search.</div>';
                    return;
                }

                container.innerHTML = data.results.slice(0, 15).map((song, idx) => `
                    <div class="search-result-item" onclick="app.loadSongFromUG(${idx}, '${this.escapeHtml(song.song_name)}', '${this.escapeHtml(song.artist_name)}')">
                        <div class="search-result-title">${this.escapeHtml(song.song_name)}</div>
                        <div class="search-result-artist">${this.escapeHtml(song.artist_name)}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Search error:', error);
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #f66;">Error fetching results. Check your connection.</div>';
            }
        },

        async loadSongFromUG(index, title, artist) {
            try {
                const response = await fetch(`https://api.ultimate-guitar.com/v3/search?query=${encodeURIComponent(title + ' ' + artist)}&type=Chords`);
                const data = await response.json();
                
                if (!data.results || !data.results[index]) {
                    this.showToast('Could not load song', 'error');
                    return;
                }

                const song = data.results[index];
                const tabUrl = song.tab_url;

                // Try to parse chords from URL (basic approach)
                // In a real scenario, you'd need to scrape the actual page
                const preview = `[Verse]\nChords for ${title} by ${artist}\n\n[Chorus]\nFetched from Ultimate Guitar\n\nNote: Please copy-paste the actual chords from the website.`;

                document.getElementById('importTitle').value = `${title} - ${artist}`;
                document.getElementById('importContent').value = preview + `\n\nSource: ${tabUrl}`;
                
                this.importBuffer = {
                    title: `${title} - ${artist}`,
                    body: preview,
                    url: tabUrl,
                    source: 'Ultimate Guitar'
                };

                document.getElementById('importModal').classList.add('active');
            } catch (error) {
                console.error('Load error:', error);
                this.showToast('Error loading song details', 'error');
            }
        },

        confirmImport() {
            const title = document.getElementById('importTitle').value.trim();
            const body = document.getElementById('importContent').value.trim();

            if (!title || !body) {
                this.showToast('Fill in all fields', 'error');
                return;
            }

            this.songs.push({
                title,
                body,
                createdAt: new Date().toISOString(),
                id: Date.now(),
                source: 'Ultimate Guitar'
            });

            this.saveSongs();
            this.showToast('Song imported!');
            this.cancelImport();
            this.showHome();
        },

        cancelImport() {
            document.getElementById('importModal').classList.remove('active');
            this.importBuffer = null;
        },

        // Editor Functions
        saveSong() {
            const title = document.getElementById('songTitle').value.trim();
            const body = document.getElementById('songContent').value.trim();

            if (!title) {
                this.showToast('Please enter a song title', 'error');
                return;
            }

            if (!body) {
                this.showToast('Please enter song content', 'error');
                return;
            }

            if (this.currentSongIndex !== null) {
                this.songs[this.currentSongIndex] = {
                    ...this.songs[this.currentSongIndex],
                    title,
                    body
                };
                this.showToast('Song updated');
            } else {
                this.songs.push({
                    title,
                    body,
                    createdAt: new Date().toISOString(),
                    id: Date.now(),
                    source: 'local'
                });
                this.showToast('Song added');
            }

            this.saveSongs();
            this.showHome();
        },

        editSong(index = null) {
            if (index === null) index = this.currentSongIndex;
            this.showEditor(index);
        },

        confirmDelete() {
            document.getElementById('deleteModal').classList.add('active');
        },

        cancelDelete() {
            document.getElementById('deleteModal').classList.remove('active');
        },

        deleteSong() {
            if (this.currentSongIndex !== null) {
                const title = this.songs[this.currentSongIndex].title;
                this.songs.splice(this.currentSongIndex, 1);
                this.saveSongs();
                this.showToast(`${this.escapeHtml(title)} deleted`);
                this.showHome();
            }
            this.cancelDelete();
        },

        // Viewer Functions
        viewSong(index) {
            this.currentSongIndex = index;
            this.transposeVal = 0;
            this.showScreen('viewer');
            this.renderSong();
        },

        renderSong() {
            if (this.currentSongIndex === null) return;

            const song = this.songs[this.currentSongIndex];
            document.getElementById('viewTitle').textContent = song.title;
            document.getElementById('viewerInfo').textContent = `${song.body.split('\n').length} lines`;
            document.getElementById('transposeValue').textContent = (this.transposeVal >= 0 ? '+' : '') + this.transposeVal;

            const html = song.body.split('\n').map(line => {
                const processed = line.replace(/\[(.*?)\]/g, (_, c) => {
                    const transposed = this.transposeChord(c, this.transposeVal);
                    return `<span class="c">${this.escapeHtml(transposed)}</span>`;
                });
                return `<div class="line">${this.escapeHtml(processed)}</div>`;
            }).join('');

            document.getElementById('viewContent').innerHTML = `<pre>${html}</pre>`;
        },

        transpose(amt) {
            this.transposeVal += amt;
            this.renderSong();
        },

        transposeChord(chord, amt) {
            if (!chord) return '';

            let normalized = chord
                .replace('Bb', 'A#')
                .replace('Eb', 'D#')
                .replace('Ab', 'G#')
                .replace('Db', 'C#')
                .replace('Gb', 'F#');

            return normalized.replace(/[A-G][#b]?/g, (m) => {
                let n = m.replace('Bb', 'A#').replace('Eb', 'D#').replace('Ab', 'G#').replace('Db', 'C#').replace('Gb', 'F#');
                let i = this.notes.indexOf(n);
                if (i === -1) return m;
                return this.notes[(i + amt % 12 + 120) % 12];
            });
        },

        // Scrolling
        toggleScroll() {
            if (this.scrollInterval) {
                clearInterval(this.scrollInterval);
                this.scrollInterval = null;
                document.getElementById('scrollBtn').textContent = 'Scroll';
            } else {
                document.getElementById('scrollBtn').textContent = 'Stop';
                this.scrollInterval = setInterval(() => window.scrollBy(0, 1), 50);
            }
        },

        // Utilities
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },

        showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type === 'error' ? 'error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
    };

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => app.init());
</script>

</body>
</html>
