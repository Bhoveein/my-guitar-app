<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Guitar Chords App</title>

<style>
:root {
    --bg: #ffffff;
    --card: #f5f5f5;
    --text: #222222;
    --accent: #ffc107;
    --chord: #4dabf7;
    --danger: #ff6b6b;
    --success: #51cf66;
    --shadow: rgba(0,0,0,0.1);
}

body {
    font-family: sans-serif;
    background: var(--bg);
    margin: 0;
}

.nav {
    background: var(--card);
    padding: 10px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    background: var(--accent);
}

.screen { display: none; }
.screen.active { display: block; }

.song-list { padding: 20px; }

.c {
    color: blue;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔒 LOCK SCREEN -->
<div id="lockScreen" style="
position: fixed;
inset: 0;
background: #111;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
color: white;
z-index: 999;
">
<h2>🔒 Enter Password</h2>
<input type="password" id="passwordInput" placeholder="Password" style="padding:10px;">
<button onclick="app.checkPassword()">Unlock</button>
<p id="errorMsg"></p>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="nav">
<button class="btn" onclick="app.showEditor()">Add Song</button>
</div>
<div id="songList" class="song-list"></div>
</div>

<!-- EDITOR -->
<div id="editor" class="screen">
<div class="nav">
<button class="btn" onclick="app.showHome()">Back</button>
</div>

<input id="songTitle" placeholder="Title"><br><br>
<textarea id="songContent" rows="10" style="width:100%;"></textarea><br>
<button onclick="app.saveSong()">Save</button>
</div>

<!-- VIEWER -->
<div id="viewer" class="screen">
<div class="nav">
<button onclick="app.showHome()">Back</button>
</div>
<h2 id="viewTitle"></h2>
<div id="viewContent"></div>
</div>

<script>
const app = {
    password: "2224",
    songs: [],
    currentSongIndex: null,

    init() {
        this.loadSongs();
        this.renderHome();

        const unlocked = localStorage.getItem('unlocked');
        if (unlocked === 'true') {
            document.getElementById('lockScreen').style.display = 'none';
        }
    },

    checkPassword() {
        const input = document.getElementById('passwordInput').value;

        if (input === this.password) {
            document.getElementById('lockScreen').style.display = 'none';
            localStorage.setItem('unlocked', 'true');
        } else {
            document.getElementById('errorMsg').textContent = "Wrong password";
        }
    },

    loadSongs() {
        const data = localStorage.getItem('songs');
        this.songs = data ? JSON.parse(data) : [];
    },

    saveSongs() {
        localStorage.setItem('songs', JSON.stringify(this.songs));
    },

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    showHome() {
        this.showScreen('home');
        this.renderHome();
    },

    showEditor() {
        this.currentSongIndex = null;
        document.getElementById('songTitle').value = "";
        document.getElementById('songContent').value = "";
        this.showScreen('editor');
    },

    saveSong() {
        const title = document.getElementById('songTitle').value;
        const body = document.getElementById('songContent').value;

        this.songs.push({ title, body });
        this.saveSongs();
        this.showHome();
    },

    renderHome() {
        const list = document.getElementById('songList');

        list.innerHTML = this.songs.map((s, i) => `
            <div onclick="app.viewSong(${i})">
                <b>${s.title}</b>
            </div>
        `).join('');
    },

    viewSong(index) {
        this.currentSongIndex = index;
        const song = this.songs[index];

        document.getElementById('viewTitle').textContent = song.title;

        const html = song.body.replace(/\[(.*?)\]/g, '<span class="c">$1</span>');
        document.getElementById('viewContent').innerHTML = html;

        this.showScreen('viewer');
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>

</body>
</html>
